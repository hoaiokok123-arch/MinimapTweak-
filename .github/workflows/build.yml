name: Build Minimap Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest  # Chuyển sang macOS để có sẵn Xcode
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH
    
    - name: Setup iOS SDK from Xcode
      run: |
        # Tìm SDK trong Xcode
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        echo "Found SDK at: $SDK_PATH"
        # Link SDK to Theos
        mkdir -p $HOME/theos/sdks
        ln -sf "$SDK_PATH" $HOME/theos/sdks/iPhoneOS.sdk
        echo "SDK=iphoneos" >> $GITHUB_ENV
    
    - name: Install ldid
      run: |
        curl -L -o $HOME/theos/bin/ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus-2/ldid
        chmod +x $HOME/theos/bin/ldid
    
    - name: Build Tweak
      run: |
        export THEOS=$HOME/theos
        make clean
        make package
      continue-on-error: false
    
    - name: Upload dylib artifact
      uses: actions/upload-artifact@v4
      with:
        name: MinimapTweak
        path: |
          .theos/obj/debug/*.dylib
          packages/*.deb
        if-no-files-found: warn
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        files: |
          .theos/obj/debug/*.dylib
          packages/*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
