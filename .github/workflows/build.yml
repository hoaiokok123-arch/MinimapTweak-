name: Build Minimap Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest  # Chạy trên Ubuntu

    steps:
    - uses: actions/checkout@v4

    - name: Cài đặt công cụ build
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential unzip curl

    - name: Tải và cài đặt Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Build Tweak
      run: |
        export THEOS=$HOME/theos
        export TARGET=iphone:clang:latest:14.0
        make clean
        make package

    - name: Upload file kết quả
      uses: actions/upload-artifact@v4
      with:
        name: MinimapTweak
        path: |
          .theos/obj/debug/*.dylib
          packages/*.deb
