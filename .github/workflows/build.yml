name: Build Minimap Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH
    
    - name: Setup iOS SDK
      run: |
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        mkdir -p $HOME/theos/sdks
        ln -sf "$SDK_PATH" $HOME/theos/sdks/iPhoneOS.sdk
        echo "SDK=iphoneos" >> $GITHUB_ENV
    
    - name: Install ldid (correct way)
      run: |
        # Download correct ldid binary
        curl -L -o $HOME/theos/bin/ldid https://raw.githubusercontent.com/theos/ldid/master/ldid
        chmod +x $HOME/theos/bin/ldid
        # Verify it's not empty
        if [ ! -s $HOME/theos/bin/ldid ]; then
          echo "ldid download failed, trying alternative..."
          curl -L -o $HOME/theos/bin/ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus-6/ldid
          chmod +x $HOME/theos/bin/ldid
        fi
        ls -la $HOME/theos/bin/ldid
    
    - name: Build Tweak
      run: |
        export THEOS=$HOME/theos
        make clean
        make package
      continue-on-error: false
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MinimapTweak
        path: |
          .theos/obj/debug/*.dylib
          packages/*.deb
        if-no-files-found: warn
