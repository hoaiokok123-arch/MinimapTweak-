name: Build Minimap Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cài đặt nâng cao và clone Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Cài đặt iOS SDK và công cụ ldid
      run: |
        # SỬA Ở ĐÂY: Tạo thư mục sdks và clone chính xác SDK 14.5 về thay vì dùng curl zip
        mkdir -p $HOME/theos/sdks
        git clone --depth=1 https://github.com/theos/sdks.git $HOME/theos/sdks-repo
        mv $HOME/theos/sdks-repo/iPhoneOS14.5.sdk $HOME/theos/sdks/
        rm -rf $HOME/theos/sdks-repo
        
        # Tải ldid hỗ trợ ký nhận tweak (bản dành cho macOS)
        curl -L -o $HOME/theos/bin/ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus-2/ldid-macos-x86_64
        chmod +x $HOME/theos/bin/ldid

    - name: Tiến hành Build Tweak
      run: |
        export THEOS=$HOME/theos
        export TARGET=iphone:clang:14.5:14.0
        make clean
        make package FINALPACKAGE=1

    - name: Tải file kết quả lên GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MinimapTweak-Output
        path: |
          .theos/obj/debug/*.dylib
          packages/*.deb
