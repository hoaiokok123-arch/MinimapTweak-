name: Build Minimap Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Tải và cài đặt Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Cài đặt iOS SDK & ldid
      run: |
        mkdir -p $HOME/theos/sdks
        mkdir -p $HOME/theos/bin
        
        # 1. Tải bản SDK 14.5 từ kho lưu trữ chính thức của Theos
        git clone --depth=1 https://github.com/theos/sdks.git $HOME/theos/sdks-repo
        mv $HOME/theos/sdks-repo/iPhoneOS14.5.sdk $HOME/theos/sdks/
        rm -rf $HOME/theos/sdks-repo
        
        # 2. Tải ldid CHUẨN dành cho macOS ARM64 (Sửa lỗi "Not: command not found")
        curl -L https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus-2/ldid-macos-arm64 -o $HOME/theos/bin/ldid
        chmod +x $HOME/theos/bin/ldid

    - name: Build Tweak
      run: |
        export THEOS=$HOME/theos
        export TARGET=iphone:clang:14.5:14.0
        make clean
        make package FINALPACKAGE=1

    - name: Upload file kết quả
      uses: actions/upload-artifact@v4
      with:
        name: MinimapTweak
        path: |
          .theos/obj/debug/*.dylib
          packages/*.deb
