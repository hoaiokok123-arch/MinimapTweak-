name: Build Minimap Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Tải và cài đặt cấu trúc khung phát triển Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Cài đặt iOS SDK và Cấu hình ldid chuẩn
      run: |
        # 1. Tạo các thư mục cần thiết
        mkdir -p $HOME/theos/sdks
        mkdir -p $HOME/theos/bin
        
        # 2. Clone repo chứa các SDK từ theos chính thức và lấy bản 14.5
        git clone --depth=1 https://github.com/theos/sdks.git $HOME/theos/sdks-repo
        mv $HOME/theos/sdks-repo/iPhoneOS14.5.sdk $HOME/theos/sdks/
        rm -rf $HOME/theos/sdks-repo
        
        # 3. Tải ldid trực tiếp từ nguồn release chính thức của theos dành cho macOS arm64
        curl -L https://github.com/theos/ldid/releases/latest/download/ldid-macos-arm64 -o $HOME/theos/bin/ldid
        chmod +x $HOME/theos/bin/ldid

    - name: Tiến hành Biên dịch Tweak (Build Package)
      run: |
        export THEOS=$HOME/theos
        # Cấu hình build cụ thể cho kiến trúc iOS 14
        export TARGET=iphone:clang:14.5:14.0
        make clean
        make package FINALPACKAGE=1

    - name: Lưu trữ và tải lên file kết quả (.deb và .dylib)
      uses: actions/upload-artifact@v4
      with:
        name: MinimapTweak-Build
        path: |
          .theos/obj/debug/*.dylib
          packages/*.deb
