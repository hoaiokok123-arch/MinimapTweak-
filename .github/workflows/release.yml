name: Create Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Theos
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential unzip curl
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH
    
    - name: Setup iOS SDK
      run: |
        mkdir -p $HOME/theos/sdks
        curl -L -o $HOME/theos/sdks/iPhoneOS14.5.sdk.zip https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.zip
        cd $HOME/theos/sdks && unzip -o iPhoneOS14.5.sdk.zip
    
    - name: Install ldid
      run: |
        curl -L -o $HOME/theos/bin/ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus-2/ldid
        chmod +x $HOME/theos/bin/ldid
    
    - name: Build
      run: |
        export THEOS=$HOME/theos
        make clean
        make package
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          .theos/obj/debug/*.dylib
          packages/*.deb
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}